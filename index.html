<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ebooks</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">Edu<span>Hub.</span></div>
    </nav>

    <section class="filters">

        <button class="chip" data-topic="all">All</button>

        <button class="chip" data-topic="fiction">Fiction</button>

        <button class="chip" data-topic="non-fiction">Non-Fiction</button>

        <button class="chip" data-topic="science">Science</button>

        <button class="chip" data-topic="history">History</button>

    </section>

    <section class="books">
        <div class="book-card" data-topic="fiction">
            <h3>Sample Fiction Book</h3>
        </div>

        <div class="book-card" data-topic="science">
            <h3>Physics Handbook</h3>
        </div>
    </section>

    <script>
        const chips = document.querySelectorAll('.chip');
        const books = document.querySelectorAll('.book-card');

        chips.forEach(chip => {
            chip.addEventListener('click', () => {

                chips.forEach(c => c.classList.remove('active'));
                chip.classList.add('active');

                const topic = chip.dataset.topic;

                books.forEach(book => {
                    if (topic === "all" || book.dataset.topic === topic) {
                        book.style.display = "block";
                    } else {
                        book.style.display = "none";
                    }
                });
            });
        });
    </script>

</body>
</html>
