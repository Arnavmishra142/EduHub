<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Previous Year Papers | EduHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* PYQ Specific Inline Styles for Zero Cache Issues */
        .pyq-header { text-align: center; padding: 4rem 20px 2rem; }
        .pyq-title { font-size: 2.5rem; font-weight: 700; margin-bottom: 10px; color: #ffffff; }
        .pyq-subtitle { color: #a1a1aa; font-size: 1.1rem; }
        
        /* Breadcrumb Navigation */
        .breadcrumb { display: flex; justify-content: center; gap: 8px; margin-bottom: 2rem; color: #a1a1aa; font-size: 0.95rem; font-weight: 500;}
        .breadcrumb span { cursor: pointer; transition: color 0.2s; }
        .breadcrumb span:hover { color: #ffffff; }
        .breadcrumb .active { color: #25D366; cursor: default; }
        
        /* Dynamic Grid */
        .dynamic-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; max-width: 900px; margin: 0 auto; padding-bottom: 4rem;}
        
        /* Interactive Cards */
        .selection-card { background: #18181b; border: 1px solid #27272a; border-radius: 12px; padding: 1.5rem; text-align: center; cursor: pointer; transition: all 0.3s ease; }
        .selection-card:hover { transform: translateY(-5px); border-color: #ffffff; background: #27272a; }
        .selection-card h3 { color: #ffffff; font-size: 1.3rem; margin-top: 10px; }
        .selection-card p { color: #a1a1aa; font-size: 0.9rem; margin-top: 5px; }
        .selection-card.disabled { opacity: 0.5; cursor: not-allowed; }
        .selection-card.disabled:hover { transform: none; border-color: #27272a; background: #18181b; }
        
        /* Final Download Buttons */
        .paper-card { background: #18181b; border: 1px solid #27272a; border-radius: 12px; padding: 1.5rem; display: flex; justify-content: space-between; align-items: center; transition: border-color 0.2s; }
        .paper-card:hover { border-color: #25D366; }
        .paper-info h3 { color: #fff; font-size: 1.1rem; margin-bottom: 4px; }
        .dl-btn { background: #ffffff; color: #000000; padding: 10px 20px; border-radius: 8px; font-weight: 600; text-decoration: none; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .dl-btn:hover { background: #25D366; color: #ffffff; transform: scale(1.05); }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="back-link" style="color:#a1a1aa; text-decoration:none;">← Back to Home</a>
        <div class="logo">Edu<span>Hub.</span></div>
    </nav>

    <header class="pyq-header">
        <h1 class="pyq-title">Past Year Papers</h1>
        <p class="pyq-subtitle">One-click download for previous year questions and solutions.</p>
    </header>

    <main class="container">
        <div class="breadcrumb" id="breadcrumb">
            </div>

        <div class="dynamic-grid" id="contentArea">
            </div>
    </main>

    <script src="pyq-db.js"></script>
    <script src="pyqs.js"></script>

</body>
</html>
