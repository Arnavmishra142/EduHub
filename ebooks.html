<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global E-Library | EduHub</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">

    <style>
        /* ==================== REQUEST A BOOK UI ==================== */
        .request-btn {
            background: #ffffff !important;
            color: #000000 !important;
            font-weight: 600 !important;
            padding: 12px 24px !important;
            border-radius: 50px !important;
            border: none !important;
            cursor: pointer !important;
            font-size: 0.95rem !important;
            display: inline-flex !important;
            align-items: center !important;
            justify-content: center !important;
            gap: 8px !important;
            transition: transform 0.2s, opacity 0.2s !important;
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.1) !important;
            margin: 0 auto;
        }
        .request-btn:hover {
            transform: translateY(-3px) !important;
            opacity: 0.9 !important;
        }

        /* Modal Styling */
        .request-modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            z-index: 2000; display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: 0.3s ease-in-out;
        }
        .request-modal-overlay.active { opacity: 1; pointer-events: auto; }

        .request-modal {
            background: #09090b; border: 1px solid #27272a; border-radius: 16px;
            width: 90%; max-width: 400px; padding: 25px;
            transform: translateY(30px); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: left;
        }
        .request-modal-overlay.active .request-modal { transform: translateY(0); }

        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .modal-header h3 { margin: 0; color: #ffffff; font-size: 1.3rem; }
        .close-icon { background: transparent; border: none; color: #a1a1aa; cursor: pointer; font-size: 1.2rem; }
        .close-icon:hover { color: #ef4444; }

        .modal-body p { color: #a1a1aa; font-size: 0.9rem; margin-bottom: 20px; line-height: 1.5; margin-top: 0;}
        .modal-body strong { color: #ffffff; }

        .modal-body input {
            width: 100%; background: #18181b; border: 1px solid #27272a;
            color: #ffffff; padding: 14px; border-radius: 10px; margin-bottom: 15px;
            outline: none; font-size: 0.95rem; transition: border-color 0.2s;
            box-sizing: border-box;
        }
        .modal-body input:focus { border-color: #ffffff; }

        .submit-req-btn {
            width: 100%; background: #25D366; color: #ffffff; border: none;
            padding: 14px; border-radius: 10px; font-weight: 600; cursor: pointer;
            font-size: 1rem; display: flex; justify-content: center; align-items: center; gap: 8px;
            transition: background 0.2s;
        }
        .submit-req-btn:hover { background: #1ebd57; }
    </style>
</head>    
</body>
    
    <nav class="navbar">
        <a href="index.html" class="back-link">← Back to Home</a>
        <div class="logo">Edu<span>Hub.</span></div>
    </nav>

    <header class="ebooks-header">
        <h1 class="hero-title">Global E-Library</h1>
        <p class="hero-subtitle">Search thousands of classics, novels, and reference books.</p>
        
        <div class="search-box">
            <input type="text" id="ebookSearch" placeholder="Search books, authors, or topics..." autocomplete="off">
            <button id="searchBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.3-4.3"></path>
                </svg>
            </button>
        </div>

             <div class="category-chips" id="categoryChips">
            <button class="chip" data-topic="fiction">Fiction</button>
            <button class="chip" data-topic="philosophy">Philosophy</button>
            <button class="chip" data-topic="science">Science</button>
            <button class="chip" data-topic="politics">Politics</button>
            <button class="chip" data-topic="history">History</button>
            
            <a href="manga/index.html" style="text-decoration: none;">
                <button type="button" class="chip" style="background: linear-gradient(135deg, #e11d48, #9f1239); color: white; border: 1px solid #fda4af; font-weight: 600; text-shadow: 0px 0px 5px rgba(255,255,255,0.3); box-shadow: 0 0 12px rgba(225, 29, 72, 0.5); padding: 8px 16px; border-radius: 20px; cursor: pointer;">
                    🎌 Manga Zone
                </button>
            </a>
             </div>
        

        <div style="margin-top: 2rem;">
            <button id="openRequestBtn" class="request-btn">
                <span>📚</span> Can't find a book? Request Here!
            </button>
        </div>
    </header>
    
    <main class="container">
        <div id="loadingIndicator" class="loading-state" style="display: none;">
            <div class="spinner"></div>
            <p>Fetching premium books...</p>
        </div>

        <div class="ebooks-grid" id="ebooksGrid"></div>
    </main>

    <div class="request-modal-overlay" id="requestModal">
        <div class="request-modal">
            <div class="modal-header">
                <h3>Request a Book</h3>
                <button id="closeRequestBtn" class="close-icon">✖</button>
            </div>
            <div class="modal-body">
                <p>Tell us which book you need. We will add it to the library within <strong>48 Hours!</strong> ⏳</p>
                <input type="text" id="reqName" placeholder="Your Name" autocomplete="off">
                <input type="text" id="reqBook" placeholder="Book Name & Author">
                <button id="sendRequestBtn" class="submit-req-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="white" stroke="currentColor" stroke-width="0"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/></svg>
                    Send Request to Admin
                </button>
            </div>
        </div>
    </div>

    <script src="ebooks.js"></script>
</body>
</html>
