<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global E-Library | EduHub</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="back-link">← Back to Home</a>
        <div class="logo">Edu<span>Hub.</span></div>
    </nav>

    <header class="ebooks-header">
        <h1 class="hero-title">Global E-Library</h1>
        <p class="hero-subtitle">Search thousands of classics, novels, and reference books.</p>
        
        <div class="search-box">
            <input type="text" id="ebookSearch" placeholder="Search books, authors, or topics..." autocomplete="off">
            <button id="searchBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.3-4.3"></path>
                </svg>
            </button>
        </div>

        <div class="category-chips" id="categoryChips">
            <button class="chip" data-topic="fiction">Fiction</button>
            <button class="chip" data-topic="philosophy">Philosophy</button>
            <button class="chip" data-topic="science">Science</button>
            <button class="chip" data-topic="politics">Politics</button>
            <button class="chip" data-topic="history">History</button>
        </div>
    </header>
            </div>

        <div style="margin-top: 1.5rem;">
            <button id="openRequestBtn" class="request-btn">
                <span>📚</span> Can't find a book? Request Here!
            </button>
        </div>
</header>
    
    <main class="container">
        <div id="loadingIndicator" class="loading-state" style="display: none;">
            <div class="spinner"></div>
            <p>Fetching premium books...</p>
        </div>

        <div class="ebooks-grid" id="ebooksGrid"></div>
    </main>

    <div class="reader-overlay" id="readerOverlay">
        <div class="reader-header">
            <h3 id="readerTitle">Book Title</h3>
            <div class="reader-actions">
                <button id="downloadBtn" class="reader-btn download-btn">⬇️ Download File</button>
                <button id="closeReader" class="reader-btn close-btn">✖ Close</button>
            </div>
        </div>
        <div class="reader-content" id="readerContent">
            </div>
    </div>

    <script src="ebooks.js"></script>
            </div>

        <div style="margin-top: 1.5rem;">
            <button id="openRequestBtn" class="request-btn">
                <span>📚</span> Can't find a book? Request Here!
            </button>
        </div>
</header>
    
</body>
</html>
